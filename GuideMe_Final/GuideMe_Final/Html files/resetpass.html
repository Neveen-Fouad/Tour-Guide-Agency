<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Css files/resetPass.css">
    <title>Reset Password</title>
</head>

<body>

    <!-- reset form -->

    <div class="auth-wrapper">
        <div class="auth-container" id="container">
            <div class="form-container reset-container">
                <form id="resetForm" method="POST">

                    <h1 style="margin-top: 50px;">Reset Password</h1>
                    <p>Create your new password.</p>

                    <input type="password" id="newPassword" placeholder="New Password" required>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm Password" required>

                    <button id="resetBtn" type="submit" class="btn-primary"> Reset Password</button>
                </form>

            </div>

            <!-- overlay -->

            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-right">
                        <h1>Password Reset</h1>
                        <p>
                            Your account is almost ready.
                            Enter a new password to continue.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../Js files/resetPass.js"></script>

</body>

</html>
